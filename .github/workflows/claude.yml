name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Project Setup
        run: |
          npm run setup
          npx playwright install --with-deps chromium
          npm run dev:daemon

      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 >/dev/null; then
              echo "Dev server is up"; exit 0
            fi
            echo "waiting for localhost:3000 ($i)..."; sleep 2
          done
          echo "Dev server did not become ready in time"; cat logs.txt || true; exit 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # No `prompt:` — leaving it empty keeps the action in "tag mode" so it
          # reads the @claude issue/comment as the task and auto-posts the reply.
          # Environment/tooling context goes in --append-system-prompt below.
          claude_args: |
            --append-system-prompt "The project is already set up with all dependencies installed and the dev server is already running at http://localhost:3000 (logs in logs.txt). You can query the SQLite db with the 'sqlite3' cli. Use the mcp__playwright tools to launch a browser, navigate to localhost:3000, and interact with the app to verify behavior."
            --max-turns 30
            --mcp-config '{"mcpServers":{"playwright":{"command":"npx","args":["@playwright/mcp@latest","--allowed-origins","localhost:3000;cdn.tailwindcss.com;esm.sh"]}}}'
            --allowedTools "Read,Glob,Grep,Bash(npm:*),Bash(sqlite3:*),Bash(cat:*),Bash(tail:*),mcp__playwright__browser_snapshot,mcp__playwright__browser_navigate,mcp__playwright__browser_navigate_back,mcp__playwright__browser_click,mcp__playwright__browser_type,mcp__playwright__browser_wait_for,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_console_messages"

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

